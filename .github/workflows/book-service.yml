name: book-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "book-service/**"
      - ".github/workflows/book-service.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: book-service-cicd
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SERVICE_PATH: book-service
  CONTAINER_NAME: online-bookstore-book-service
  SERVICE_PORT: "5002"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: book-service
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/online-bookstore-book-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.SERVICE_PATH }}
          file: ./${{ env.SERVICE_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    environment: book-service
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/online-bookstore-book-service
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Validate required deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "$DEPLOY_HOST" ] || { echo "Missing secret: DEPLOY_HOST"; exit 1; }
          [ -n "$DEPLOY_USERNAME" ] || { echo "Missing secret: DEPLOY_USERNAME"; exit 1; }
          [ -n "$DEPLOY_SSH_KEY" ] || { echo "Missing secret: DEPLOY_SSH_KEY"; exit 1; }
          [ -n "$DOCKERHUB_USERNAME" ] || { echo "Missing secret: DOCKERHUB_USERNAME"; exit 1; }
          [ -n "$DOCKERHUB_TOKEN" ] || { echo "Missing secret: DOCKERHUB_TOKEN"; exit 1; }

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          timeout: 60s
          command_timeout: 20m
          debug: true
          script_stop: true
          script: |
            set -u
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin:/snap/bin

            echo "Connected to $(hostname) as $(whoami)"
            
            # Start docker if it's not running
            if command -v systemctl > /dev/null 2>&1; then
              sudo systemctl start docker || true
            fi
            
            sudo docker --version

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin || {
              echo "Docker login failed"
              exit 1
            }
            
            sudo docker pull ${{ env.IMAGE_NAME }}:latest || {
              echo "Docker pull failed for image: ${{ env.IMAGE_NAME }}:latest"
              exit 1
            }

            TARGET_CONTAINER="${{ env.CONTAINER_NAME }}"
            EXISTING_ID="$(sudo docker ps -aq --filter "name=^/${TARGET_CONTAINER}$" || true)"
            if [ -n "$EXISTING_ID" ]; then
              sudo docker rm -f "$TARGET_CONTAINER" || true
            fi

            # Automatically create the .env directory and file
            sudo mkdir -p /opt/online-bookstore
            ENV_FILE="/opt/online-bookstore/${{ env.SERVICE_PATH }}.env"
            
            # Write environment variables directly from GitHub Secrets to the .env file
            echo "PORT=${{ env.SERVICE_PORT }}" | sudo tee $ENV_FILE > /dev/null
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" | sudo tee -a $ENV_FILE > /dev/null
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" | sudo tee -a $ENV_FILE > /dev/null
            echo "CLIENT_ORIGIN=${{ secrets.CLIENT_ORIGIN }}" | sudo tee -a $ENV_FILE > /dev/null
            
            sudo chmod 600 $ENV_FILE
            ENV_FILE_ARG="--env-file $ENV_FILE"

            sudo docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.SERVICE_PORT }}:${{ env.SERVICE_PORT }} \
              $ENV_FILE_ARG \
              ${{ env.IMAGE_NAME }}:latest || {
                echo "Container start failed for: ${{ env.CONTAINER_NAME }}"
                sudo docker ps -a --filter "name=${{ env.CONTAINER_NAME }}" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" || true
                exit 1
              }

            sudo docker ps --filter "name=${{ env.CONTAINER_NAME }}" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" || true
