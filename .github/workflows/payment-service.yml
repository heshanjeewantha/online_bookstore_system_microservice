name: payment-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "payment-service/**"
      - ".github/workflows/payment-service.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: payment-service-cicd
  cancel-in-progress: true

env:
  SERVICE_PATH: payment-service
  CONTAINER_NAME: online-bookstore-payment-service
  SERVICE_PORT: "5004"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: payment-service
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/online-bookstore-payment-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.SERVICE_PATH }}
          file: ./${{ env.SERVICE_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    environment: payment-service
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/online-bookstore-payment-service
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            echo "${{ secrets.DOCKERHUB}}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:latest

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            ENV_FILE="/opt/online-bookstore/${{ env.SERVICE_PATH }}.env"
            ENV_FILE_ARG=""
            if [ -f "$ENV_FILE" ]; then
              ENV_FILE_ARG="--env-file $ENV_FILE"
            fi

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.SERVICE_PORT }}:${{ env.SERVICE_PORT }} \
              $ENV_FILE_ARG \
              ${{ env.IMAGE_NAME }}:latest
